<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Weather App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* 🌈 Animated Gradient Background */
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#111827);
  background-size:400% 400%;
  animation:gradientBG 12s ease infinite;
  overflow-x:hidden;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ✨ Neon Glowing Header */
.neon-title{
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 5px #00f2ff,
              0 0 10px #00f2ff,
              0 0 20px #00f2ff,
              0 0 40px #00f2ff;
}

/* 🔥 Glassmorphism Panel */
.about-panel{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  border-left:1px solid rgba(255,255,255,0.2);
  box-shadow:-10px 0 40px rgba(0,0,0,0.6);
  transition:0.7s cubic-bezier(.68,-0.55,.27,1.55);
  padding:30px;
  z-index:1000;
  transform:rotateY(90deg);
  transform-origin:right;
}

.about-panel.active{
  right:0;
  transform:rotateY(0deg);
}

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  transition:0.4s;
  z-index:900;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* Buttons */
.about-links a{
  display:block;
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  transition:0.3s;
}

.instagram{
  background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.youtube{
  background:#ff0000;
}

.about-links a:hover{
  transform:scale(1.1);
}

/* Map & Chart */
#map{height:200px;width:300px;border-radius:15px;}
#chart{height:200px!important;}

</style>
</head>

<body class="p-5">

<div id="overlay" class="overlay" onclick="closeAbout()"></div>

<!-- Glass About Panel -->
<div id="aboutPanel" class="about-panel">
  <div class="flex justify-between items-center">
    <h2 class="text-xl font-bold">About Me</h2>
    <span onclick="closeAbout()" class="cursor-pointer text-xl">✕</span>
  </div>

  <p class="text-sm mt-4 opacity-80">Follow my pages 👇</p>

  <div class="about-links mt-4">
    <a href="https://www.instagram.com/snaps_by_mughesh?igsh=MXcxbTJnazFlNHh6aQ==" target="_blank" class="instagram">📸 Instagram</a>
    <a href="http://www.youtube.com/@Snaps_by_mughesh" target="_blank" class="youtube">▶ YouTube</a>
  </div>
</div>

<div class="max-w-4xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="neon-title">⚡ Neon Weather</h1>
  <button onclick="openAbout()" class="bg-cyan-500 px-4 py-2 rounded-lg shadow-lg hover:scale-110 transition">About</button>
</div>

<!-- Search -->
<div class="flex gap-3 mb-6">
  <input id="city" class="flex-1 p-3 rounded-lg text-black" placeholder="Enter City">
  <button onclick="getWeather()" class="bg-green-500 px-4 rounded-lg">Search</button>
</div>

<!-- Current Weather -->
<div class="bg-black/40 backdrop-blur-lg p-6 rounded-2xl mb-6 shadow-2xl">
  <h2 id="place" class="text-2xl font-bold"></h2>
  <p id="desc"></p>
  <div class="text-5xl font-bold mt-2">
    <span id="temp"></span>°C
  </div>
  <p>Rainfall: <span id="rain"></span></p>
</div>

<div class="grid md:grid-cols-2 gap-6">

  <div>
    <h3 class="mb-2 font-bold">Location Map</h3>
    <div id="map"></div>
  </div>

  <div>
    <h3 class="mb-2 font-bold">5-Day Forecast</h3>
    <div id="forecast" class="grid grid-cols-2 gap-3"></div>
  </div>

</div>

<div class="mt-10 flex justify-center">
  <div class="bg-black/40 backdrop-blur-lg p-4 rounded-2xl w-[350px] md:w-[450px] shadow-2xl">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

<script>

const apiKey="9ba95a597475d04073c505b3460c12ce";
let map,marker,chart;

function openAbout(){
  document.getElementById("aboutPanel").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeAbout(){
  document.getElementById("aboutPanel").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

async function getWeather(){
  const city=document.getElementById("city").value||"Chennai";

  const weatherRes=await fetch(
  `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
  const weather=await weatherRes.json();

  document.getElementById("place").textContent=weather.name;
  document.getElementById("desc").textContent=weather.weather[0].description;
  document.getElementById("temp").textContent=Math.round(weather.main.temp);
  document.getElementById("rain").textContent=
    weather.rain?.["1h"]?weather.rain["1h"]+" mm":"0 mm";

  const lat=weather.coord.lat;
  const lon=weather.coord.lon;

  if(!map){
    map=L.map("map").setView([lat,lon],8);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  }else{map.setView([lat,lon],8);}

  if(marker)marker.remove();
  marker=L.marker([lat,lon]).addTo(map);

  const forecastRes=await fetch(
  `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`);
  const forecast=await forecastRes.json();

  const container=document.getElementById("forecast");
  container.innerHTML="";

  const daily=forecast.list.filter(i=>i.dt_txt.includes("12:00:00"));
  const temps=[],labels=[];

  daily.forEach(day=>{
    const date=new Date(day.dt*1000);
    labels.push(date.toLocaleDateString(undefined,{weekday:"short"}));
    temps.push(day.main.temp);

    const card=document.createElement("div");
    card.className="bg-black/40 p-3 rounded-xl text-center backdrop-blur-lg";
    card.innerHTML=`
      <div>${date.toLocaleDateString(undefined,{weekday:"short"})}</div>
      <div class="text-xl font-bold">${Math.round(day.main.temp)}°C</div>
      <div class="text-xs">${day.weather[0].description}</div>
    `;
    container.appendChild(card);
  });

  if(chart)chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels:labels,
      datasets:[{data:temps,borderColor:"#00f2ff",tension:0.4}]},
    options:{responsive:true,plugins:{legend:{display:false}}}
  });
}

getWeather();

</script>

</body>
</html>
